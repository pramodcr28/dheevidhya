server {
    listen 80;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    default_type application/octet-stream;

    # Enable gzip
    gzip on;
    gzip_http_version 1.1;
    gzip_disable "MSIE [1-6]\.";
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript text/html;
    gzip_comp_level 6;

    # Cache static assets (long-term caching)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html (SPA fallback)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Angular SPA routes fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
