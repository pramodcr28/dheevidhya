<section id="contact" class="py-24 px-6 lg:px-12 bg-surface-800 dark:bg-surface-950">
  <div class="max-w-4xl mx-auto text-center fade-up">
    <span class="text-surface-300 mb-6">Get Started Today</span>
    <h2 class="text-5xl md:text-6xl font-extrabold text-surface-0 mt-4 leading-tight">
      Transform Your<br /><span class="text-primary-500">Institution Today</span>
    </h2>
    <p class="text-xl text-surface-400 mt-6 max-w-xl mx-auto">
      Administration handled. Staff empowered. School transformed.
    </p>

    <div class="mt-12 rounded-2xl p-8 md:p-12 text-left bg-surface-700 dark:bg-surface-800">
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">Full Name</label>
          <input type="text" placeholder="Dr. Ramesh Kumar"
                 [(ngModel)]="contactForm.fullName"
                 class="form-input w-full rounded-xl px-4 py-3 text-sm outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">Institution Name</label>
          <input type="text" placeholder="Sri Vidya Academy"
                 [(ngModel)]="contactForm.institutionName"
                 class="form-input w-full rounded-xl px-4 py-3 text-sm outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">Email Address</label>
          <input type="email" placeholder="admin@example.edu"
                 [(ngModel)]="contactForm.email"
                 class="form-input w-full rounded-xl px-4 py-3 text-sm outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">Phone Number</label>
          <input type="tel" placeholder="+91 98765 43210"
                 [(ngModel)]="contactForm.phone"
                 class="form-input w-full rounded-xl px-4 py-3 text-sm outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">Number of Students</label>
          <select class="form-input form-select w-full rounded-xl px-4 py-3 text-sm outline-none"
                  [(ngModel)]="contactForm.studentRange">
            <option>Under 500</option>
            <option>500 – 1000</option>
            <option>1000 – 2000</option>
            <option>2000 – 5000</option>
            <option>5000+</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">City</label>
          <input type="text" placeholder="Bangalore, Karnataka"
                 [(ngModel)]="contactForm.city"
                 class="form-input w-full rounded-xl px-4 py-3 text-sm outline-none" />
        </div>
      </div>
      <div class="mt-6">
        <label class="block text-xs font-semibold text-surface-300 mb-2 uppercase tracking-wider">Message (Optional)</label>
        <textarea rows="3" placeholder="Tell us about your institution's needs..."
                  [(ngModel)]="contactForm.message"
                  class="form-input w-full rounded-xl px-4 py-3 text-sm outline-none resize-none"></textarea>
      </div>
      <div class="mt-6 flex flex-col sm:flex-row gap-4">
        <div class="btn-orange text-base flex-1 text-center py-3" (click)="formSubmit.emit()">
          Submit
        </div>
        <button class="btn-outline text-base flex-1 text-center py-3" disabled>
          Download Brochure
        </button>
      </div>
    </div>
  </div>
</section>
