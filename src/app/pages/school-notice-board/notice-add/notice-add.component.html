<p-dialog 
  [header]="editMode ? 'Edit Notice' : 'Create New Notice'" 
  [(visible)]="visible" 
  [modal]="true" 
  [style]="{ width: '90vw', maxHeight: '90vh' }" 
  [breakpoints]="{ '960px': '95vw' }" 
  (onHide)="close()" 
  [draggable]="false"
  [resizable]="false"
  styleClass="rounded-2xl">
  
  <form [formGroup]="noticeForm" (ngSubmit)="submit()" class="flex flex-col h-full">
    <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 overflow-y-auto pr-2" style="max-height: calc(90vh - 150px);">
      
      <!-- LEFT SIDE -->
      <div class="space-y-4">
        
        <!-- General Info -->
        <p-panel header="General Information" [toggleable]="false" styleClass="rounded-xl">
          <div class="space-y-4">
            <!-- Title -->
            <div>
              <label for="title" class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">
                Title <span class="text-red-500">*</span>
              </label>
              <input 
                pInputText 
                id="title" 
                formControlName="title" 
                placeholder="Enter notice title"
                class="w-full" />
              <small class="text-red-500" *ngIf="noticeForm.get('title')?.invalid && noticeForm.get('title')?.touched">
                Title is required (min 5 characters)
              </small>
            </div>

            <!-- Priority -->
            <div>
              <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">
                Priority <span class="text-red-500">*</span>
              </label>
              <p-selectButton 
                [options]="priorityOptions" 
                formControlName="priority" 
                optionLabel="label" 
                optionValue="value" 
                [multiple]="false"
                styleClass="w-full">
              </p-selectButton>
            </div>
          </div>
        </p-panel>

        <!-- Category -->
        <p-panel header="Category Details" [toggleable]="false" styleClass="rounded-xl">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">
                Category <span class="text-red-500">*</span>
              </label>
              <p-select 
                [options]="categoryOptions" 
                optionLabel="label" 
                optionValue="value" 
                formControlName="categoryType" 
                placeholder="Select category" 
                class="w-full">
                <ng-template let-option pTemplate="item">
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs" [ngClass]="option.colorClass">
                      <i [class]="option.icon"></i>
                    </div>
                    <span>{{option.label}}</span>
                  </div>
                </ng-template>
              </p-select>
            </div>

            <!-- Dynamic Category Fields -->
            <ng-container [ngSwitch]="categoryType">
              
              <!-- Timetable -->
              <div *ngSwitchCase="'TIMETABLE'" formGroupName="timetable">
                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Effective Date</label>
                <p-datepicker 
                  formControlName="effectiveDate" 
                  dateFormat="yy-mm-dd" 
                  [showIcon]="true"
                  placeholder="Select effective date" 
                  class="w-full">
                </p-datepicker>
              </div>

              <!-- Attendance -->
              <div *ngSwitchCase="'ATTENDANCE'" formGroupName="attendance" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Attendance %</label>
                    <p-inputNumber 
                      formControlName="attendancePercentage" 
                      [min]="0" 
                      [max]="100"
                      placeholder="%" 
                      class="w-full">
                    </p-inputNumber>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Type</label>
                    <p-select 
                      [options]="attendanceTypes" 
                      formControlName="attendanceType" 
                      optionLabel="label" 
                      optionValue="value" 
                      placeholder="Select Type" 
                      class="w-full">
                    </p-select>
                  </div>
                </div>
                <div class="flex items-center gap-2">
                  <p-checkbox 
                    formControlName="parentMeetingRequired" 
                    [binary]="true" 
                    inputId="parentMeetingRequired" />
                  <label for="parentMeetingRequired" class="text-sm text-gray-700 dark:text-gray-300">
                    Parent meeting required
                  </label>
                </div>
              </div>

              <!-- Exam Announcement -->
              <div *ngSwitchCase="'EXAM_ANNOUNCEMENT'" formGroupName="examAnnouncement" class="space-y-3">
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Exam Title</label>
                  <input pInputText formControlName="examTitle" placeholder="Enter exam title" class="w-full" />
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Exam Type</label>
                  <p-select 
                    [options]="examTypes" 
                    formControlName="examType" 
                    placeholder="Select Exam Type" 
                    class="w-full">
                  </p-select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Start Date</label>
                    <p-datepicker 
                      formControlName="examStartDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="Start Date" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">End Date</label>
                    <p-datepicker 
                      formControlName="examEndDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="End Date" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                </div>
              </div>

              <!-- Exam Result -->
              <div *ngSwitchCase="'EXAM_RESULT'" formGroupName="examResult" class="space-y-3">
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Exam Title</label>
                  <input pInputText formControlName="examTitle" placeholder="Enter exam title" class="w-full" />
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Exam Type</label>
                  <p-select 
                    [options]="examTypes" 
                    formControlName="examType" 
                    placeholder="Select Exam Type" 
                    class="w-full">
                  </p-select>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Result Declaration Date</label>
                  <p-datepicker 
                    formControlName="resultDeclarationDate" 
                    dateFormat="yy-mm-dd" 
                    [showIcon]="true"
                    placeholder="Publish Date" 
                    class="w-full">
                  </p-datepicker>
                </div>
              </div>

              <!-- Holiday -->
              <div *ngSwitchCase="'HOLIDAY'" formGroupName="holiday" class="space-y-3">
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Holiday Type</label>
                  <p-select 
                    [options]="holidayTypes" 
                    formControlName="holidayType" 
                    optionLabel="label" 
                    optionValue="value" 
                    placeholder="Select Holiday Type" 
                    (onChange)="onHolidayTypeChange()"
                    class="w-full">
                  </p-select>
                </div>
                
                <div *ngIf="noticeForm.get('holiday.holidayType')?.value === 'Week_off'">
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Week Off Day</label>
                  <p-select 
                    [options]="weekDays" 
                    formControlName="weekOffDay" 
                    optionLabel="label" 
                    optionValue="value" 
                    placeholder="Select Day" 
                    class="w-full">
                  </p-select>
                </div>

                <div *ngIf="noticeForm.get('holiday.holidayType')?.value !== 'Week_off'" class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Start Date</label>
                    <p-datepicker 
                      formControlName="holidayStartDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="Holiday Start" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">End Date</label>
                    <p-datepicker 
                      formControlName="holidayEndDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="Holiday End" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                </div>
              </div>

              <!-- Meeting -->
              <div *ngSwitchCase="'MEETING'" formGroupName="meeting" class="space-y-3">
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Meeting Type</label>
                  <p-select 
                    [options]="meetingTypes" 
                    formControlName="meetingType" 
                    placeholder="Select Meeting Type" 
                    class="w-full">
                  </p-select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Meeting Date</label>
                    <p-datepicker 
                      formControlName="meetingDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="Date" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Meeting Time</label>
                    <p-datepicker 
                      formControlName="meetingTime" 
                      [timeOnly]="true"
                      placeholder="Time" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Venue</label>
                  <input pInputText formControlName="venue" placeholder="Enter venue" class="w-full" />
                </div>
              </div>

              <!-- Appreciation -->
              <div *ngSwitchCase="'APPRECIATION'" formGroupName="appreciation" class="space-y-3">
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Recipient IDs</label>
                  <input 
                    pInputText 
                    formControlName="recipientIds" 
                    placeholder="Comma separated IDs" 
                    class="w-full" />
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Achievement Category</label>
                    <p-select 
                      [options]="appreciationCategories" 
                      formControlName="achievementCategory" 
                      optionLabel="label" 
                      optionValue="value" 
                      placeholder="Select Category" 
                      class="w-full">
                    </p-select>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Recognition Level</label>
                    <p-select 
                      [options]="recognitionLevels" 
                      formControlName="recognitionLevel" 
                      optionLabel="label" 
                      optionValue="value" 
                      placeholder="Select Level" 
                      class="w-full">
                    </p-select>
                  </div>
                </div>
              </div>

              <!-- School Achievement -->
              <div *ngSwitchCase="'SCHOOL_ACHIEVEMENT'" formGroupName="schoolAchievement" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Achievement Category</label>
                    <p-select 
                      [options]="schoolAchievementCategories" 
                      formControlName="achievementCategory" 
                      optionLabel="label" 
                      optionValue="value" 
                      placeholder="Select Category" 
                      class="w-full">
                    </p-select>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Achievement Date</label>
                    <p-datepicker 
                      formControlName="achievementDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="Date" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Recipient IDs</label>
                  <input 
                    pInputText 
                    formControlName="recipientIds" 
                    placeholder="Comma separated IDs" 
                    class="w-full" />
                </div>
              </div>

              <!-- Fest -->
              <div *ngSwitchCase="'FEST'" formGroupName="fest" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Fest Name</label>
                    <input pInputText formControlName="festName" placeholder="Fest name" class="w-full" />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Fest Type</label>
                    <p-select 
                      [options]="festTypes" 
                      formControlName="festType" 
                      optionLabel="label" 
                      optionValue="value" 
                      placeholder="Select Type" 
                      class="w-full">
                    </p-select>
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Start Date</label>
                    <p-datepicker 
                      formControlName="eventStartDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="Start Date" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">End Date</label>
                    <p-datepicker 
                      formControlName="eventEndDate" 
                      dateFormat="yy-mm-dd" 
                      [showIcon]="true"
                      placeholder="End Date" 
                      class="w-full">
                    </p-datepicker>
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Venue</label>
                  <input pInputText formControlName="venue" placeholder="Enter venue" class="w-full" />
                </div>
              </div>
            </ng-container>
          </div>
        </p-panel>

        <!-- Audience -->
        <p-panel header="Target Audience" [toggleable]="false" styleClass="rounded-xl">
          <div formGroupName="targetAudience" class="space-y-3">
            <div>
              <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">
                Audience Type <span class="text-red-500">*</span>
              </label>
              <p-select 
                [options]="targetTypeOptions" 
                optionLabel="label" 
                optionValue="value" 
                formControlName="type" 
                placeholder="Select audience type" 
                class="w-full">
              </p-select>
            </div>
            
            <div *ngIf="noticeForm.get('targetAudience.type')?.value !== 'ALL'">
              <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Target IDs</label>
              <input 
                pInputText 
                formControlName="targetIds" 
                placeholder="Comma separated IDs"
                class="w-full" />
            </div>
          </div>
        </p-panel>
      </div>

      <!-- RIGHT SIDE - Content Editor -->
      <div>
        <p-panel header="Notice Content" [toggleable]="false" styleClass="rounded-xl h-full">
          <p-editor 
            formControlName="content" 
            [style]="{ height: '500px' }" 
            placeholder="Write notice content here..."
            class="w-full">
          </p-editor>
        </p-panel>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 pt-4 mt-4 border-t border-gray-200 dark:border-gray-700">
      <p-button 
        label="Cancel" 
        icon="pi pi-times" 
        severity="secondary"
        [outlined]="true"
        type="button"
        (click)="close()">
      </p-button>
      <p-button 
        [label]="editMode ? 'Update' : 'Publish'" 
        [icon]="editMode ? 'pi pi-check' : 'pi pi-send'" 
        type="submit" 
        [disabled]="!noticeForm.valid">
      </p-button>
    </div>
  </form>
</p-dialog>
