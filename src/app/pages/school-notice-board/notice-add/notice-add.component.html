<p-dialog header="Create New Notice" [(visible)]="visible" [modal]="true" [style]="{ width: '90vw', height: '90vh' }" [breakpoints]="{ '960px': '95vw' }" (onHide)="close()" class="rounded-2xl">
    <form [formGroup]="noticeForm" (ngSubmit)="submit()" class="flex flex-col h-full overflow-hidden">
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6 overflow-y-auto pr-2">
            <!-- LEFT SIDE -->
            <div class="col-span-1 space-y-6">
                <!-- General Info -->
                <p-panel header="General Information" [toggleable]="true" class="rounded-xl shadow">
                    <div class="flex flex-wrap gap-4">
                        <!-- Title - 60% -->
                        <div class="flex-1 min-w-[60%]">
                            <label for="title">Title</label>
                            <input pInputText id="title" formControlName="title" class="w-full mt-2" />
                        </div>

                        <!-- Priority - 40% -->
                        <div class="flex-1 min-w-[35%]">
                            <label class="block text-sm font-semibold mb-2 text-gray-700">Priority</label>
                            <p-selectButton [options]="priorityOptions" formControlName="priority" optionLabel="label" optionValue="value" [multiple]="false" class="w-full"></p-selectButton>
                        </div>
                    </div>
                </p-panel>

                <!-- Dynamic Fields -->
                <p-panel header="Category" [toggleable]="true" class="rounded-xl shadow">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <p-select [options]="categoryOptions" optionLabel="label" optionValue="value" formControlName="categoryType" placeholder="Select category" class="w-full"> </p-select>
                    </div>
                    <ng-container [ngSwitch]="categoryType">
                        <!-- Timetable -->
                        <div *ngSwitchCase="'TIMETABLE'" [formGroup]="noticeForm.controls.timetable" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p-date-picker formControlName="effectiveDate" dateFormat="yy-mm-dd" showIcon placeholder="Effective Date" class="w-full"></p-date-picker>
                        </div>

                        <!-- Attendance -->
                        <div *ngSwitchCase="'ATTENDANCE'" [formGroup]="noticeForm.controls.attendance" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p-inputNumber formControlName="attendancePercentage" mode="decimal" placeholder="Attendance %" class="w-full"></p-inputNumber>

                            <!-- Attendance Type as select -->
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-700">Attendance Type</label>
                                <p-select [options]="attendanceTypes" formControlName="attendanceType" optionLabel="label" optionValue="value" placeholder="Select Type" class="w-full"> </p-select>
                            </div>

                            <div class="col-span-2">
                                <p-checkbox formControlName="parentMeetingRequired" [binary]="true" inputId="parentMeetingRequired" />
                                <label for="parentMeetingRequired" class="ml-2">Parent meeting required</label>
                            </div>
                        </div>

                        <!-- Exam Announcement -->
                        <div *ngSwitchCase="'EXAM_ANNOUNCEMENT'" [formGroup]="noticeForm.controls.examAnnouncement" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p-floatlabel>
                                <input pInputText id="examTitle" formControlName="examTitle" class="w-full" />
                                <label for="examTitle">Exam Title</label>
                            </p-floatlabel>
                            <div>
                                <!-- <label class="block font-semibold mb-1">Exam Type</label> -->
                                <p-select [options]="examTypes" optionValue="value" formControlName="examType" placeholder="Select Exam Type" class="w-full"> </p-select>
                            </div>

                            <p-datepicker formControlName="examStartDate" dateFormat="yy-mm-dd" showIcon placeholder="Start Date" class="w-full"></p-datepicker>
                            <p-datepicker formControlName="examEndDate" dateFormat="yy-mm-dd" showIcon placeholder="End Date" class="w-full"></p-datepicker>
                        </div>

                        <!-- Exam Result -->
                        <div *ngSwitchCase="'EXAM_RESULT'" [formGroup]="noticeForm.controls.examResult" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- <p-floatlabel>
                                <input pInputText id="examTitle" formControlName="examTitle" class="w-full" />
                                <label for="examTitle">Exam Title</label>
                            </p-floatlabel> -->
                            <div>
                                <!-- <label class="block font-semibold mb-1">Exam Type</label> -->
                                <p-select [options]="examTypes" optionValue="value" formControlName="examType" placeholder="Select Exam Type" class="w-full"> </p-select>
                            </div>
                            <p-datepicker formControlName="resultDeclarationDate" dateFormat="yy-mm-dd" showIcon placeholder="Publish Date" class="w-full"></p-datepicker>
                        </div>

                        <div *ngSwitchCase="'HOLIDAY'" [formGroup]="noticeForm.controls.holiday" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p-select [options]="holidayTypes" formControlName="holidayType" optionLabel="label" optionValue="value" placeholder="Select Holiday Type" class="w-full" (onChange)="onHolidayTypeChange()"> </p-select>

                            <!-- Week Off Day Selection (only show when holidayType is Week_off) -->
                            <div *ngIf="noticeForm.controls.holiday.controls.holidayType.value === 'Week_off'">
                                <p-select [options]="weekDays" formControlName="weekOffDay" optionLabel="label" optionValue="value" placeholder="Select Day" class="w-full"> </p-select>
                            </div>

                            <!-- Date Range (show for all other holiday types except Week_off) -->
                            <div *ngIf="noticeForm.controls.holiday.controls.holidayType.value !== 'Week_off'" class="col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <p-datepicker formControlName="holidayStartDate"  dateFormat="yy-mm-dd" showIcon placeholder="Holiday Start" class="w-full"> </p-datepicker>
                                <p-datepicker formControlName="holidayEndDate" dateFormat="yy-mm-dd" showIcon placeholder="Holiday End" class="w-full"> </p-datepicker>
                            </div>
                        </div>

                        <div *ngSwitchCase="'MEETING'" [formGroup]="noticeForm.controls.meeting" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <p-select [options]="meetingTypes" formControlName="meetingType" placeholder="Select Meeting Type" class="w-full"> </p-select>
                            </div>
                            <p-datepicker formControlName="meetingDate" dateFormat="yy-mm-dd" showIcon placeholder="Meeting Date" class="w-full"> </p-datepicker>

                            <p-datepicker formControlName="meetingTime" timeOnly="true" hourFormat="24" placeholder="Select Time" class="w-full"> </p-datepicker>

                            <p-floatlabel>
                                <input pInputText id="venue" formControlName="venue" class="w-full" />
                                <label for="venue">Venue</label>
                            </p-floatlabel>
                        </div>

                        <div *ngSwitchCase="'APPRECIATION'" [formGroup]="noticeForm.controls.appreciation" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Recipient IDs -->
                            <div class="md:col-span-2">
                                <p-floatlabel>
                                    <input pInputText id="recipientIds" formControlName="recipientIds" class="w-full" />
                                    <label for="recipientIds">Recipient IDs (comma separated)</label>
                                </p-floatlabel>
                            </div>

                            <!-- Achievement Category -->
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-700">Achievement Category</label>
                                <p-select [options]="appreciationCategories" formControlName="achievementCategory" optionLabel="label" optionValue="value" placeholder="Select Category" class="w-full"> </p-select>
                            </div>

                            <!-- Recognition Level -->
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-700">Recognition Level</label>
                                <p-select [options]="recognitionLevels" formControlName="recognitionLevel" optionLabel="label" optionValue="value" placeholder="Select Level" class="w-full"> </p-select>
                            </div>
                        </div>
                        <!-- School Achievement -->
                        <div *ngSwitchCase="'SCHOOL_ACHIEVEMENT'" [formGroup]="noticeForm.controls.schoolAchievement" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Achievement Category -->
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-700">Achievement Category</label>
                                <p-select [options]="schoolAchievementCategories" formControlName="achievementCategory" optionLabel="label" optionValue="value" placeholder="Select Category" class="w-full"> </p-select>
                            </div>

                            <!-- Achievement Date -->
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-gray-700">Achievement Date</label>
                                <p-datepicker formControlName="achievementDate" dateFormat="yy-mm-dd" showIcon placeholder="Achievement Date" class="w-full"> </p-datepicker>
                            </div>

                            <!-- Recipient IDs -->
                            <div class="md:col-span-2">
                                <p-floatlabel>
                                    <input pInputText id="recipientIds" formControlName="recipientIds" class="w-full" />
                                    <label for="recipientIds">Recipient IDs (comma separated)</label>
                                </p-floatlabel>
                            </div>
                        </div>

                        <!-- Fest -->
                        <div *ngSwitchCase="'FEST'" [formGroup]="noticeForm.controls.fest" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <p-floatlabel>
                                <input pInputText id="festName" formControlName="festName" class="w-full" />
                                <label for="festName">Fest Name</label>
                            </p-floatlabel>

                            <p-select [options]="festTypes" formControlName="festType" optionLabel="label" optionValue="value" placeholder="Select Fest Type" class="w-full"> </p-select>

                            <p-datepicker formControlName="eventStartDate" dateFormat="yy-mm-dd" showIcon placeholder="Event Start Date" class="w-full"></p-datepicker>
                            <p-datepicker formControlName="eventEndDate" dateFormat="yy-mm-dd" showIcon placeholder="Event End Date" class="w-full"></p-datepicker>

                            <p-floatlabel>
                                <input pInputText id="venue" formControlName="venue" class="w-full" />
                                <label for="venue">Venue</label>
                            </p-floatlabel>
                        </div>
                    </ng-container>
                </p-panel>
                <!-- Category & Target Audience -->
                <p-panel header="Audience" [toggleable]="true" class="rounded-xl shadow">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" formGroupName="targetAudience">
                        <!-- Audience Type -->
                        <div>
                            <p-select [options]="targetTypeOptions" optionLabel="label" optionValue="value" formControlName="type" placeholder="Select audience type" class="w-full"> </p-select>
                        </div>

                        <!-- Target IDs (only if type ≠ ALL) -->
                        <div *ngIf="noticeForm.get('targetAudience.type')?.value !== 'ALL'">
                            <p-floatlabel>
                                <input pInputText id="targetIds" formControlName="targetIds" class="w-full" />
                                <label for="targetIds">Target Ids</label>
                            </p-floatlabel>
                        </div>
                    </div>
                </p-panel>
            </div>

            <!-- RIGHT SIDE -->
            <div class="col-span-1">
                <p-panel header="Notice Content" class="rounded-xl shadow">
                    <p-editor formControlName="content" [style]="{ height: 'calc(90vh - 200px)' }" placeholder="Write notice content..." class="w-full"> </p-editor>
                </p-panel>
                <!-- Footer -->
                <div class="flex justify-end gap-3 p-4 pb-0 bg-white border-t border-gray-200 sticky bottom-0">
                    <p-button label="Cancel" icon="pi pi-times" severity="secondary" (click)="close()" class="rounded-lg"> </p-button>
                    <p-button label="Publish" icon="pi pi-send" type="submit" [disabled]="!noticeForm.valid"> </p-button>
                </div>
            </div>
        </div>
    </form>
</p-dialog>
