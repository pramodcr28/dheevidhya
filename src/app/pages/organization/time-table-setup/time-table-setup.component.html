<!-- timetable-generator.component.html -->
<div class="min-h-screen bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100">
  <!-- Header -->
  <div class="bg-white shadow-sm border-b dark:bg-slate-800 dark:border-slate-600">
    <div class="px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center">
          <button 
            class="mr-4  hover:" 
            [routerLink]="['/home/time-table-list']">
            <i class="pi pi-arrow-left"></i>
          </button>
          <div class="flex items-center justify-center">
             <h1 class="text-lg font-semibold  m-0">New Timetable</h1>
          </div>
        </div>
        <!-- <div class="flex items-center space-x-3">
          <button class=" hover:">
            <i class="pi pi-cog"></i>
          </button>
          <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2 py-1 rounded">PRO</span>
        </div> -->
      </div>
    </div>
  </div>

  <div>
    <div class="flex gap-8">
      <div class="flex-1">
        <p-tabView [(activeIndex)]="activeIndex" styleClass="custom-tabview">
          <p-tabPanel header="General Settings">
            <app-general-settings></app-general-settings>
          </p-tabPanel>
          <p-tabPanel header="Subjects/Courses" [disabled]="!timeTableService.timeTable?.department">
            <app-subjects></app-subjects>
          </p-tabPanel>
          <p-tabPanel header="Teachers/Instructors" [disabled]="!timeTableService.timeTable?.department">
            <app-teachers></app-teachers>
          </p-tabPanel>
          <p-tabPanel header="Review & Generate" [disabled]="!timeTableService.timeTable?.department">
            <app-review></app-review>
          </p-tabPanel>
        </p-tabView>
      </div>

      <div class="w-80 hidden xl:block">
        <app-side-panel [activeIndex]="activeIndex"></app-side-panel>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg dark:bg-slate-800 dark:border-slate-600">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-4">
        <button (click)="previousTab()" 
                [disabled]="activeIndex === 0"
                class="px-4 py-2  hover: disabled:opacity-50">
          <i class="pi pi-arrow-left mr-2"></i>
          Previous
        </button>
        <span class="text-sm ">Step {{activeIndex + 1}} of 4</span>
        <button (click)="nextTab()" 
                [disabled]="activeIndex === 3 || !timeTableService.timeTable?.department"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 dark:bg-blue-500 dark:hover:bg-blue-600 dark:disabled:bg-blue-400">
          Next
          <i class="pi pi-arrow-right ml-2"></i>
        </button>
      </div>
    </div>
  </div>
</div>
