<div class="space-y-6 p-6">
  <div class="space-y-4">
    @if(this.timeTableService.classes){
    <ng-container *ngFor="let section of this.timeTableService.classes">

          <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            
            <button
              (click)="toggleSection(section.id)"
              class="w-full px-6 py-4 flex items-center justify-between bg-gradient-to-r from-blue-50 to-indigo-50 hover:from-blue-100 hover:to-indigo-100 transition-colors border-b border-gray-200"
            >
              <div class="flex items-center gap-4 text-left">
                <i 
                  class="pi  transition-transform"
                  [ngClass]="isSectionExpanded(section.id) ? 'pi-chevron-down' : 'pi-chevron-right'"
                ></i>
                <div>
                  <p class="font-semibold ">{{ section.name }}</p>
                </div>
              </div>
              
              <div class="flex items-center gap-3">
                <span class="inline-flex items-center px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-medium">
                  {{ section.subjects.length }} Subjects
                </span>
  
              </div>
            </button>

            <div *ngIf="isSectionExpanded(section.id)" class="px-6 py-4">
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead>
                    <tr class="border-b bg-gray-50">
                      <th class="text-left py-3 px-4 font-medium  text-sm">NAME</th>
                      <th class="text-left py-3 px-4 font-medium  text-sm">PERIOD/WEEK</th>
                      <th class="text-left py-3 px-4 font-medium  text-sm">ACTIONS</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr 
                      *ngFor="let subject of section.subjects; let i = index"
                      class="border-b hover:bg-gray-50 transition-colors"
                    >
                      <td class="py-3 px-4">
                        <span class="font-medium ">{{ subject.name }}</span>
                      </td>
                      <td class="py-3 px-4">
                        <p-inputNumber
                          [(ngModel)]="subject.hours_per_week"
                          name="hoursPerWeek"
                          [min]="0"
                          [max]="40"
                          [useGrouping]="false"
                          styleClass="w-20"
                          inputStyleClass="text-center font-medium"
                        ></p-inputNumber>
                      </td>

                      <td class="py-3 px-4">
                        <button
                          (click)="removeSubject(section.id, section.id, i, this.timeTableService.classes)"
                          pRipple
                          class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded transition-colors"
                          pTooltip="Remove subject"
                          tooltipPosition="top"
                        >
                          <i class="pi pi-trash text-sm"></i>
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- Empty State -->
              <div *ngIf="section.subjects.length === 0" class="text-center py-8">
                <p class=" text-sm">No subjects assigned to this section</p>
              </div>
            </div>
          </div>
    </ng-container>
    }

  </div>
</div>
