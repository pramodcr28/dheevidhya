<div class="w-full overflow-x-auto py-4 bg-white dark:bg-gray-900 h-full">
  <div class="scale-[0.9] md:scale-100 origin-top">

    
    <p-organizationChart [value]="data"  class=" w-fit mx-auto" >
      
      <!-- Default template -->
      <ng-template let-node pTemplate="default">
        <div
          class="p-3 rounded-xl shadow-md bg-white dark:bg-gray-800 border border-blue-300 dark:border-blue-700 hover:bg-blue-50 dark:hover:bg-blue-600 text-center min-w-[120px] whitespace-nowrap cursor-pointer"
          (click)="toggleNode(node, $event)"
        >
          {{ node.label }}
        </div>
      </ng-template>

      <ng-template let-node pTemplate="branch">
        <div class="pb-3">
          <span>🌿 {{ node.label }}</span>

            <button type="button" (click)="toggleNode(node, $event)"
            class="absolute left-1/2 bottom-[-12px] transform -translate-x-1/2 
                    bg-white rounded-full w-6  h-6 flex items-center justify-center 
                    border border-primary-300 hover:border-white shadow-md 
                    hover:bg-primary-500 text-primary-500 hover:text-white z-10">
                <i class="pi" [ngClass]="node.expanded ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
            </button>

        </div>
      </ng-template>

      <ng-template let-node pTemplate="department">
       <div class="pb-3">
         <span class="flex items-center justify-center cursor-pointer" (click)="openEditOrganizationDailogue(node)" > <i class="pi pi-pen-to-square"></i>

            <button type="button" (click)="toggleNode(node, $event)"
            class="absolute left-1/2 bottom-[-12px] transform -translate-x-1/2 
                    bg-white rounded-full w-6  h-6 flex items-center justify-center 
                    border border-primary-300 hover:border-white shadow-md 
                    hover:bg-primary-500 text-primary-500 hover:text-white z-10">
                <i class="pi" [ngClass]="node.expanded ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
            </button>

        </div>
      </ng-template>

      <ng-template let-node pTemplate="class">
        <div class="pb-3">
          📘 {{ node.label }}

                    border border-primary-300 hover:border-white shadow-md 
                    hover:bg-primary-500 text-primary-500 hover:text-white z-10">
                <i class="pi" [ngClass]="node.expanded ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
            </button>

        </div>
      </ng-template>

<p-toast />


<p-dialog [(visible)]="dialogVisible" [style]="{ width: '80vw' }" header="Edit Organization" [modal]="true">
  @if(selectedDepartment){
    <form #orgForm="ngForm" class="space-y-6">
      <!-- Department Level -->
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block font-bold mb-1">HOD</label>
       
          <p-select 
            [options]="users" 
            [(ngModel)]="selectedDepartment.hod" 
            name="hod"
            optionLabel="fullName" 
            optionValue="userId"
            placeholder="Select HOD"
            class="w-full">
          </p-select>
        </div>
      </div>

      <!-- Class Loop -->
      <div *ngFor="let classGroup of selectedDepartment.classes; let ci = index" class="border p-4 rounded-md">
        <h4 class="text-md font-semibold mb-2 text-center">{{classGroup.name}}</h4>

        <!-- Section Loop -->
        <div *ngFor="let section of classGroup.sections; let si = index" class="  mb-4">
 
          <div class="grid grid-cols-2 gap-4 space-y-6">
            <div>
              <label class="block font-bold my-4">{{section.name}}</label>
              <p-select  
                [options]="users" 
                [(ngModel)]="section.sectionTeacher" 
                name="sectionTeacher_{{ ci }}_{{ si }}"
                optionLabel="fullName" 
                optionValue="userId"
                placeholder="Select Section Teacher"
                class="w-full">
              </p-select>
            </div>
          </div>

          <!-- Subject Loop -->
           <div class=" bg-gray-50 border mt-4">
            <h5 class="text-md font-semibold py-2 text-center text-primary-500">Subjects</h5>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 my-4 rounded-md">
        
              <div *ngFor="let subject of section.subjects; let subi = index">
                <label class="block font-bold mb-1">{{subject.name}}</label>
                <p-select
                  [options]="users"
                  [(ngModel)]="subject.teacher"
                  name="subjectTeacher_{{ ci }}_{{ si }}_{{ subi }}"
                  optionLabel="fullName" 
                  optionValue="userId"
                  placeholder="Select Subject Teacher"
                  class="w-full">
                </p-select>
              </div>
            </div>
           </div>
        </div>
      </div>

      <div class="flex justify-end gap-4 mt-4">
        <button pButton type="button" label="Cancel" icon="pi pi-times" (click)="dialogVisible = false"></button>
        <button pButton type="button" label="Save" icon="pi pi-check" (click)="saveDepartment()"></button>
      </div>
    </form>
  }
</p-dialog>
