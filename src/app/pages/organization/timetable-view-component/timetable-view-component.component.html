<div class="p-4 bg-white shadow rounded-xl border border-gray-200">
  <!-- Section Selector -->
  <p-dropdown
    [options]="sectionOptions"
    [(ngModel)]="selectedSection"
    optionLabel="label"
    placeholder="Select Section"
    class="w-full mb-4"
    (onChange)="onSectionChange()"
  ></p-dropdown>

  <!-- Time Table Grid -->
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left border border-gray-300">
      <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-4 py-2 border-r">Day / Time</th>
          <th *ngFor="let slot of uniqueTimeSlots" class="px-4 py-2 border-r">
            {{ slot }}
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let day of days" class="border-t">
          <td class="px-4 py-2 font-semibold text-gray-700 border-r bg-gray-50">{{ day }}</td>
          <td *ngFor="let slot of uniqueTimeSlots" class="px-4 py-2 border-r align-top">
            <ng-container [ngSwitch]="getPeriod(day, slot)?.type">
              <!-- Class -->
              <div *ngSwitchCase="'class'" class="bg-blue-50 p-2 rounded">
                <div class="font-medium text-blue-800">
                  {{ getPeriod(day, slot)?.subject.name }}
                </div>
                <div class="text-xs text-gray-600">
                  {{ getPeriod(day, slot)?.instructor.name }}<br />
                  {{ getPeriod(day, slot)?.classroom.building }} {{ getPeriod(day, slot)?.classroom.roomNumber }}
                </div>
              </div>

              <!-- Break -->
              <div *ngSwitchCase="'break'" class="bg-yellow-100 text-yellow-800 text-center p-2 rounded font-semibold">
                {{ getPeriod(day, slot)?.name }}
              </div>

              <!-- Empty -->
              <div *ngSwitchDefault class="text-gray-400 italic text-center">—</div>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
