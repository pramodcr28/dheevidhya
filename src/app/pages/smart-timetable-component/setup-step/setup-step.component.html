<div class="space-y-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Time Table Settings</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Academic Year -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Academic Year</label>
          <p-dropdown
            [(ngModel)]="settings.academicYear"
            [options]="academicYears"
            optionLabel="label"
            optionValue="value"
            placeholder="Select Academic Year"
            class="w-full">
          </p-dropdown>
        </div>

        <!-- Semester -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Semester</label>
          <p-dropdown
            [(ngModel)]="settings.semester"
            [options]="semesters"
            optionLabel="label"
            optionValue="value"
            placeholder="Select Semester"
            class="w-full">
          </p-dropdown>
        </div>

        <!-- Department -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Department</label>
          <p-dropdown
            [(ngModel)]="settings.department"
            [options]="departments"
            optionLabel="label"
            optionValue="value"
            placeholder="Select Department"
            class="w-full">
          </p-dropdown>
        </div>

        <!-- Class/Section -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Class/Section</label>
          <p-dropdown
            [(ngModel)]="settings.classSection"
            [options]="classSections"
            optionLabel="label"
            optionValue="value"
            placeholder="Select Class/Section"
            class="w-full">
          </p-dropdown>
        </div>
      </div>

      <!-- Working Days -->
      <div class="space-y-2">
        <label class="block text-sm font-medium text-gray-700">Working Days</label>
        <p-multiSelect
          [(ngModel)]="settings.workingDays"
          [options]="workingDays"
          optionLabel="label"
          optionValue="value"
          placeholder="Select Working Days"
          class="w-full">
        </p-multiSelect>
      </div>

      <!-- Time Slots -->
      <p-card header="Time Slots" class="mt-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Start Time</label>
            <input
              type="time"
              [(ngModel)]="settings.startTime"
              class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          
          <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">End Time</label>
            <input
              type="time"
              [(ngModel)]="settings.endTime"
              class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          </div>
          
          <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Period Duration (mins)</label>
            <p-inputNumber
              [(ngModel)]="settings.periodDuration"
              [min]="30"
              [max]="120"
              suffix=" mins"
              class="w-full">
            </p-inputNumber>
          </div>
          
          <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Break Duration (mins)</label>
            <p-inputNumber
              [(ngModel)]="settings.breakDuration"
              [min]="5"
              [max]="30"
              suffix=" mins"
              class="w-full">
            </p-inputNumber>
          </div>
        </div>
      </p-card>

      <!-- Next Button -->
      <div class="flex justify-end mt-6">
        <button
          pButton
          label="Next"
          icon="pi pi-arrow-right"
          iconPos="right"
          (click)="onNext()"
          class="p-button-primary">
        </button>
      </div>
    </div>
