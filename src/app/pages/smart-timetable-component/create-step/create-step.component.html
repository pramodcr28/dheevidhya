  <div class="space-y-6">
      <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-800">Subjects & Teachers</h2>
        <button
          pButton
          label="Add Subject"
          icon="pi pi-plus"
          (click)="showAddSubjectDialog()"
          class="p-button-primary">
        </button>
      </div>

      <!-- Subjects Table -->
      <p-table 
        [value]="subjects" 
        [responsive]="true"
        styleClass="p-datatable-gridlines">
        <ng-template pTemplate="header">
          <tr>
            <th>Subject</th>
            <th>Teacher</th>
            <th>Hours/Week</th>
            <th>Color</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-subject>
          <tr>
            <td>{{ subject.name }}</td>
            <td>{{ subject.teacher }}</td>
            <td>{{ subject.hoursPerWeek }}</td>
            <td>
              <div 
                class="w-8 h-8 rounded-full border-2 border-gray-300"
                [style.background-color]="subject.color">
              </div>
            </td>
            <td>
              <div class="flex gap-2">
                <button
                  pButton
                  icon="pi pi-pencil"
                  class="p-button-text p-button-sm"
                  (click)="editSubject(subject)">
                </button>
                <button
                  pButton
                  icon="pi pi-trash"
                  class="p-button-text p-button-danger p-button-sm"
                  (click)="deleteSubject(subject.id)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="text-center py-8 text-gray-500">
              No subjects added yet. Click "Add Subject" to get started.
            </td>
          </tr>
        </ng-template>
      </p-table>

      <!-- Navigation Buttons -->
      <div class="flex justify-between mt-8">
        <button
          pButton
          label="Previous"
          icon="pi pi-arrow-left"
          (click)="onPrevious()"
          class="p-button-secondary">
        </button>
        <button
          pButton
          label="Next"
          icon="pi pi-arrow-right"
          iconPos="right"
          (click)="onNext()"
          [disabled]="subjects.length === 0"
          class="p-button-primary">
        </button>
      </div>
    </div>

    <!-- Add/Edit Subject Dialog -->
    <p-dialog
      [(visible)]="displayDialog"
      [header]="dialogMode === 'add' ? 'Add Subject' : 'Edit Subject'"
      [modal]="true"
      [closable]="true"
      [style]="{ width: '500px' }">
      
      <div class="space-y-4">
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Subject Name</label>
          <input
            pInputText
            [(ngModel)]="currentSubject.name"
            placeholder="Enter subject name"
            class="w-full">
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Teacher Name</label>
          <input
            pInputText
            [(ngModel)]="currentSubject.teacher"
            placeholder="Enter teacher name"
            class="w-full">
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Hours per Week</label>
          <p-inputNumber
            [(ngModel)]="currentSubject.hoursPerWeek"
            [min]="1"
            [max]="40"
            class="w-full">
          </p-inputNumber>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Color</label>
          <div class="flex items-center gap-3">
            <div 
              class="w-10 h-10 rounded-full border-2 border-gray-300 cursor-pointer"
              [style.background-color]="currentSubject.color"
              (click)="showColorPicker = !showColorPicker">
            </div>
            <p-colorPicker
              [(ngModel)]="currentSubject.color"
              [style]="{ display: showColorPicker ? 'block' : 'none' }"
              format="hex">
            </p-colorPicker>
            <span class="text-sm text-gray-600">{{ currentSubject.color }}</span>
          </div>
        </div>
      </div>

      <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
          <button
            pButton
            label="Cancel"
            (click)="hideDialog()"
            class="p-button-text">
          </button>
          <button
            pButton
            [label]="dialogMode === 'add' ? 'Add' : 'Update'"
            (click)="saveSubject()"
            [disabled]="!isSubjectValid()"
            class="p-button-primary">
          </button>
        </div>
      </ng-template>
    </p-dialog>
