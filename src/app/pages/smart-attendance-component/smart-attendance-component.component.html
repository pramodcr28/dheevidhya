<div class="min-h-screen bg-white dark:bg-gray-800 rounded-lg shadow-xl mb-6 overflow-hidden">
  <div class="bg-gradient-to-r from-primary-600 to-primary-500 dark:from-primary-800 dark:to-indigo-800 p-4 sm:p-6">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0">
      <div class="flex items-center space-x-4">
        <div class="p-2 sm:p-3 bg-white/20 rounded-xl">
          <i class="pi pi-building text-xl sm:text-2xl text-white"></i>
        </div>
        <div>
          <h1 class="text-xl sm:text-2xl font-bold text-white">Student Attendance</h1>
          <p class="text-primary-100 text-sm">Configure your academic structure</p>
        </div>
      </div>          
    </div>
  </div> 

  <div>
    <p-tabs [(value)]="activeTab" [scrollable]="true">
      <p-tablist class="border-b border-gray-200 dark:border-gray-700">
        <p-tab 
          value="0" 
          class="py-4 px-1 border-b-2 font-medium text-sm transition-colors text-gray-500 hover:text-blue-600 data-[p-active=true]:text-blue-600 data-[p-active=true]:border-blue-500 border-transparent">
          Take Attendance
        </p-tab>
        <p-tab 
          value="1" 
          class="py-4 px-1 border-b-2 font-medium text-sm transition-colors text-gray-500 hover:text-blue-600 data-[p-active=true]:text-blue-600 data-[p-active=true]:border-blue-500 border-transparent ml-8">
          Reports & Analytics
        </p-tab>
        <p-tab 
          value="2" 
          class="py-4 px-1 border-b-2 font-medium text-sm transition-colors text-gray-500 hover:text-blue-600 data-[p-active=true]:text-blue-600 data-[p-active=true]:border-blue-500 border-transparent ml-8">
          Detailed Reports
        </p-tab>
      </p-tablist>
      
      <p-tabpanels>
        <p-tabpanel value="0">
          <div class="min-h-screen">
            <app-take-attendence></app-take-attendence>
          </div>
        </p-tabpanel>
        
        <p-tabpanel value="1">
          <div class="min-h-screen">
            <app-attendence-report></app-attendence-report>
          </div>
        </p-tabpanel>
        
        <p-tabpanel value="2">
          <div class="min-h-screen">
            <app-detailed-reports></app-detailed-reports>
          </div>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>
</div>
