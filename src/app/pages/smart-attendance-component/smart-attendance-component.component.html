<div class="min-h-screen bg-gray-50 dark:bg-gray-900 rounded-xl shadow-lg overflow-hidden">

  <div class="bg-gradient-to-r from-primary-600 via-primary-500 to-primary-400
              dark:from-primary-900 dark:via-primary-800 dark:to-primary-700
              px-6 py-5">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">

      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-xl bg-white/20 backdrop-blur-sm
                    flex items-center justify-center flex-shrink-0
                    ring-1 ring-white/30 shadow-lg">
          <i class="pi pi-users text-white text-xl"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-white tracking-tight">Student Attendance</h1>
          <p class="text-primary-100 dark:text-primary-300 text-xs font-medium mt-0.5">
            {{ activeView === 'take' ? 'Mark and record session attendance' : 'View analytics and reports' }}
          </p>
        </div>
      </div>

      <div class="flex items-center gap-1 bg-white/15 backdrop-blur-sm
                  rounded-xl p-1 ring-1 ring-white/20 self-start sm:self-auto">

        <button
          (click)="activeView = 'take'"
          class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold
                 transition-all duration-200 cursor-pointer border-0 outline-none"
          [ngClass]="activeView === 'take'
            ? 'bg-white text-primary-700 shadow-md'
            : 'bg-transparent text-white hover:bg-white/10'"
        >
          <i class="pi pi-user-edit text-sm"></i>
          <span>Take Attendance</span>
        </button>

        <button
          (click)="activeView = 'report'"
          class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold
                 transition-all duration-200 cursor-pointer border-0 outline-none"
          [ngClass]="activeView === 'report'
            ? 'bg-white text-primary-700 shadow-md'
            : 'bg-transparent text-white hover:bg-white/10'"
        >
          <i class="pi pi-chart-bar text-sm"></i>
          <span>Reports</span>
        </button>

      </div>
    </div>

    <div class="mt-4 flex items-center gap-2.5">
      <div class="flex items-center gap-1">
        <span class="block h-1 w-6 rounded-full transition-all duration-300"
              [ngClass]="activeView === 'take' ? 'bg-white' : 'bg-white/30'"></span>
        <span class="block h-1 w-6 rounded-full transition-all duration-300"
              [ngClass]="activeView === 'report' ? 'bg-white' : 'bg-white/30'"></span>
      </div>
      <span class="text-white/70 text-xs font-medium">
        {{ activeView === 'take' ? 'Take Attendance' : 'Detailed Reports' }}
      </span>
    </div>
  </div>

  <div class="bg-gray-50 dark:bg-gray-900 min-h-[calc(100vh-200px)]">

    @if (activeView === 'take') {
      <div>
        <app-take-attendence></app-take-attendence>
      </div>
    } @else {
      <div>
        <app-detailed-reports></app-detailed-reports>
      </div>
    }

  </div>
</div>
