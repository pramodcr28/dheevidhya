 <div class="min-h-screen rounded-lg bg-white-400 dark:bg-gray-800 rounded-2xl shadow-xl mb-6 overflow-hidden">
        <div class="bg-gradient-to-r from-primary-600 to-primary-500 dark:from-primary-800 dark:to-indigo-800 p-6">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0">
          <div class="flex items-center space-x-4">
            <div class="p-3 bg-white/20 rounded-xl">
              <i class="pi pi-building text-2xl text-white"></i>
            </div>
            <div>
              <h1 class="text-2xl font-bold text-white">Student Attendence</h1>
              <p class="text-primary-100">Configure your academic structure</p>
            </div>
          </div>          
        </div>
      </div> 

      <div class=" border-b border-gray-200">
        <div class="px-6">
          <nav class="flex space-x-8">
            <button 
              class="py-4 px-1 border-b-2 font-medium text-sm transition-colors"
              [class.border-blue-500]="activeTab === 'attendance'"
              [class.text-blue-600]="activeTab === 'attendance'"
              [class.border-transparent]="activeTab !== 'attendance'"
              [class.text-gray-500]="activeTab !== 'attendance'"
              (click)="activeTab = 'attendance'"
            >
              Take Attendance
            </button>
            <button 
              class="py-4 px-1 border-b-2 font-medium text-sm transition-colors"
              [class.border-blue-500]="activeTab === 'reports'"
              [class.text-blue-600]="activeTab === 'reports'"
              [class.border-transparent]="activeTab !== 'reports'"
              [class.text-gray-500]="activeTab !== 'reports'"
              (click)="activeTab = 'reports'"
            >
              Reports & Analytics
            </button>
            <button 
              class="py-4 px-1 border-b-2 font-medium text-sm transition-colors"
              [class.border-blue-500]="activeTab === 'detailed'"
              [class.text-blue-600]="activeTab === 'detailed'"
              [class.border-transparent]="activeTab !== 'detailed'"
              [class.text-gray-500]="activeTab !== 'detailed'"
              (click)="activeTab = 'detailed'"
            >
              Detailed Reports
            </button>
          </nav>
        </div>
      </div>

      <div *ngIf="activeTab === 'attendance'" class="px-6 py-6 min-h-screen">
        <app-take-attendence></app-take-attendence>
      </div>

      <div *ngIf="activeTab === 'reports'" class="px-6 py-6 min-h-screen">
        <app-attendence-report></app-attendence-report>
      
      </div>

      <div *ngIf="activeTab === 'detailed'" class="px-6 py-6 min-h-screen">
        <app-detailed-reports></app-detailed-reports>
      </div>
    </div>
