<app-floating-configurator></app-floating-configurator>

<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-[100vw] overflow-hidden">
  <div class="flex flex-col items-center justify-center">
    <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
      <div class="w-[600px] bg-surface-0 dark:bg-surface-900 py-20 px-8" style="border-radius: 53px">
        
        <form [formGroup]="loginForm" (ngSubmit)="login()" class="w-full space-y-6">

          <div class="text-center mb-6">
            <h2 class="text-2xl font-semibold text-surface-800 dark:text-surface-200">Login to your account</h2>
          </div>

          <div>
            <label for="username" class="block mb-2 font-medium text-surface-700 dark:text-surface-300">Username</label>
            <input pInputText id="username" #username formControlName="username" type="text" class="w-full" placeholder="Enter your username" />
            @if (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) {
                <div class="text-red-500 text-sm mt-1">Username is required.</div>
            }
          </div>

          <div>
            <label for="password" class="block mb-2 font-medium text-surface-700 dark:text-surface-300">Password</label>
            <p-password 
              id="password"  
              formControlName="password" 
              placeholder="Enter your password" 
              inputId="password" 
              [toggleMask]="true" 
              styleClass="mb-4" 
              [fluid]="true" 
              [feedback]="false">
            </p-password>
            @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
              <div class="text-red-500 text-sm mt-1">Password is required.</div>
            }
          </div>
          

          <div class="flex items-center justify-between">
            <p-checkbox inputId="rememberMe" formControlName="rememberMe" binary="true"></p-checkbox>
            <label for="rememberMe" class="ml-2 text-surface-700 dark:text-surface-300">Remember Me</label>
          </div>

          @if (authenticationError()) {
              <div class="text-red-600 text-sm">
                  Invalid username or password.
              </div>
          }

          <button pButton type="submit" label="Login" [disabled]="loginForm.invalid" class="w-full"></button>

        </form>

      </div>
    </div>
  </div>
</div>
