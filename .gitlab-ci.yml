stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

# 1️⃣ Build dheevidhya image
docker-build-dheevidhya:
  image: docker:cli
  stage: build
  services:
    - docker:dind
  before_script:
    # Secure login without exposing password in history
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --pull -t "$DOCKER_IMAGE_NAME" -f Dockerfile .
    - docker push "$DOCKER_IMAGE_NAME"
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  only:
    - master

# 2️⃣ Deploy dheevidhya container (runner inside VM)
deploy_dev_dheevidhya:
  stage: deploy
  tags:
    - vm-deploy  # 👈 Must match your GitLab Runner's tag
  script:
    - cd /opt
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker compose pull dheevidhya
    # Force recreate to avoid "container already in use" error
    - docker compose up -d --force-recreate --remove-orphans dheevidhya
    - docker image prune -f
  only:
    - master
  retry:
    max: 2
    when: runner_system_failure
